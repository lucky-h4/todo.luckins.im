<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0d9488"/>
  <!-- Clipboard body -->
  <rect x="88" y="148" width="336" height="300" rx="22" fill="white"/>
  <!-- Clip shadow -->
  <rect x="184" y="124" width="144" height="56" rx="16" fill="#0f766e"/>
  <!-- Clip hole -->
  <rect x="208" y="112" width="96" height="40" rx="12" fill="white"/>

  <!-- Row 1 — checked -->
  <rect x="120" y="214" width="32" height="32" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="3"/>
  <polyline points="126,230 133,238 150,218" fill="none" stroke="#0d9488" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="222" width="180" height="16" rx="8" fill="#0d9488" opacity="0.25"/>

  <!-- Row 2 — checked -->
  <rect x="120" y="272" width="32" height="32" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="3"/>
  <polyline points="126,288 133,296 150,276" fill="none" stroke="#0d9488" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="172" y="280" width="140" height="16" rx="8" fill="#0d9488" opacity="0.25"/>

  <!-- Row 3 — unchecked -->
  <rect x="120" y="330" width="32" height="32" rx="8" fill="none" stroke="#0d9488" stroke-width="3" opacity="0.35"/>
  <rect x="172" y="338" width="200" height="16" rx="8" fill="#0d9488" opacity="0.12"/>

  <!-- Row 4 — unchecked -->
  <rect x="120" y="388" width="32" height="32" rx="8" fill="none" stroke="#0d9488" stroke-width="3" opacity="0.35"/>
  <rect x="172" y="396" width="120" height="16" rx="8" fill="#0d9488" opacity="0.12"/>
</svg>
